<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 90" width="280" height="90">
  <defs>
    <linearGradient id="scaleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#a3a3a3"/>
    </linearGradient>
    <linearGradient id="flowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#d4d4d4"/>
    </linearGradient>
  </defs>

  <!-- Scales of Justice Icon -->
  <!-- Central pillar -->
  <line x1="36" y1="14" x2="36" y2="58" stroke="url(#scaleGrad)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Top crossbeam -->
  <line x1="16" y1="22" x2="56" y2="22" stroke="url(#scaleGrad)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Left pan chain -->
  <line x1="18" y1="22" x2="14" y2="36" stroke="#d4d4d4" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="18" y1="22" x2="22" y2="36" stroke="#d4d4d4" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Right pan chain (slightly lower = slightly unbalanced) -->
  <line x1="54" y1="22" x2="50" y2="40" stroke="#737373" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="54" y1="22" x2="58" y2="40" stroke="#737373" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Left pan (balanced) -->
  <path d="M10 36 Q18 40 26 36" stroke="#d4d4d4" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <!-- Right pan (slightly lower) -->
  <path d="M46 40 Q54 44 62 40" stroke="#737373" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="28" y1="58" x2="44" y2="58" stroke="url(#scaleGrad)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Flow arrow from base -->
  <path d="M36 58 Q36 68 44 68" stroke="url(#flowGrad)" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <polyline points="41,65 44,68 41,71" stroke="url(#flowGrad)" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Flow lines -->
  <line x1="26" y1="68" x2="38" y2="68" stroke="#a3a3a3" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="22" y1="73" x2="38" y2="73" stroke="#a3a3a3" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>

  <!-- Wordmark -->
  <!-- "Lex" weight 500 -->
  <text x="78" y="42" font-family="'Inter', 'Segoe UI', sans-serif" font-size="30" font-weight="500" fill="#f1f5f9" letter-spacing="-0.5">Lex</text>
  <!-- Underline accent under "Lex" only -->
  <line x1="78" y1="47" x2="118" y2="47" stroke="url(#scaleGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- "Flow" weight 300 lighter -->
  <text x="120" y="42" font-family="'Inter', 'Segoe UI', sans-serif" font-size="30" font-weight="300" fill="#cbd5e1" letter-spacing="-0.5">Flow</text>

  <!-- Tagline -->
  <text x="78" y="63" font-family="'Inter', 'Segoe UI', sans-serif" font-size="9.5" font-weight="400" fill="#64748b" letter-spacing="1.5">FROM JUDGMENT TO ACTION</text>
</svg>
