version: '3.9'

services:
  backend:
    build: ./backend
    ports:
      - '10000:10000'
    volumes:
      - ./backend/uploads:/app/uploads
    env_file:
      - .env
    environment:
      - PORT=10000

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:10000
    ports:
      - '5173:80'
    depends_on:
      - backend
